{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Sistema de Entradas</title>
    <!-- Bootstrap 5 & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #0ea5e9;
            --primary-hover: #0284c7;
            --glass-bg: rgba(15, 23, 42, 0.55);
            --glass-border: rgba(255, 255, 255, 0.05);
            --card-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        body {
            background: #090d16;
            font-family: 'Outfit', sans-serif;
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        /* Ambient subtle light */
        body::before {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.08) 0%, transparent 70%);
            top: -100px;
            right: -100px;
            z-index: 0;
        }

        body::after {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.05) 0%, transparent 70%);
            bottom: -150px;
            left: -150px;
            z-index: 0;
        }

        /* Glassmorphism card */
        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            padding: 2.5rem;
            box-shadow: var(--card-shadow);
            position: relative;
            z-index: 10;
            transition: border-color 0.3s;
        }

        .login-card:hover {
            border-color: rgba(14, 165, 233, 0.2);
        }

        .login-card h3 {
            font-weight: 700;
            font-size: 1.6rem;
            text-align: center;
            margin-bottom: 2rem;
            color: #ffffff;
            letter-spacing: -0.02em;
        }

        .form-label {
            color: #94a3b8;
            font-weight: 500;
            font-size: 0.85rem;
            margin-bottom: 6px;
        }

        .form-control-glass {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            color: #fff !important;
            border-radius: 12px;
            padding: 0.75rem 1rem;
            transition: all 0.3s;
        }

        .form-control-glass:focus {
            background: rgba(15, 23, 42, 0.8);
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(14, 165, 233, 0.2);
            outline: none;
        }

        .form-control-glass::placeholder {
            color: rgba(255, 255, 255, 0.25) !important;
        }

        /* Submit Button */
        .btn-login {
            background: var(--primary-color);
            border: none;
            border-radius: 12px;
            padding: 0.75rem 0;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.01em;
            color: #fff;
            transition: all 0.2s ease;
            margin-top: 1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        .btn-login:hover {
            background: var(--primary-hover);
            color: #fff;
        }

        .btn-login:active {
            transform: translateY(1px);
        }

        .forgot-password {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        .forgot-password:hover {
            color: #ffffff;
        }

        .error-message {
            background: rgba(220, 53, 69, 0.15);
            border: 1px solid rgba(220, 53, 69, 0.3);
            border-radius: 12px;
            color: #ff8a80;
            font-size: 0.85rem;
            padding: 10px 15px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>

    <div class="login-card"> 
        <h3><i class="bi bi-shield-lock-fill"></i> Iniciar Sesión</h3>
        
        <!-- Error Alerts -->
        {% if form.errors %}
        <div class="error-message">
            <i class="bi bi-exclamation-triangle-fill fs-5"></i>
            <span>Usuario o contraseña incorrectos.</span>
        </div>
        {% endif %}

        <!-- action="" is critical to preserve the ?next= query parameters for Google Camera validation redirects -->
        <form method="POST" action="">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" name="username" class="form-control form-control-glass" placeholder="Ingresa tu usuario" required autocomplete="username">
            </div>
            <div class="mb-4">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control form-control-glass" placeholder="••••••••" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn btn-login w-100"><i class="bi bi-box-arrow-in-right"></i> Entrar al Panel</button>
            
            <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
        </form>
    </div>

    <!-- Bootstrap Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
