{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eliminar Participante | Sistema de Entradas</title>
    <!-- Bootstrap 5 & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --danger-color: #ef4444;
            --danger-hover: #dc2626;
            --glass-bg: rgba(15, 23, 42, 0.55);
            --glass-border: rgba(255, 255, 255, 0.05);
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        body {
            background: #090d16;
            font-family: 'Outfit', sans-serif;
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            max-width: 480px;
            width: 100%;
        }

        .btn {
            border-radius: 10px;
            font-weight: 500;
            padding: 0.55rem 1.1rem;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid transparent;
        }

        .btn-danger-glow {
            background: var(--danger-color);
            color: #fff;
        }
        .btn-danger-glow:hover {
            background: var(--danger-hover);
            color: #fff;
        }

        .btn-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: #94a3b8;
        }
        .btn-glass:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .icon-warning {
            color: var(--danger-color);
            filter: drop-shadow(0 0 10px rgba(239, 68, 68, 0.2));
        }
    </style>
</head>
<body>
<div class="container d-flex justify-content-center align-items-center">
    <div class="glass-card shadow-lg p-5 text-center">
        <!-- Icon -->
        <div class="mb-4">
            <i class="bi bi-exclamation-triangle-fill icon-warning" style="font-size: 3.5rem;"></i>
        </div>

        <!-- Title -->
        <h3 class="fw-bold mb-3 text-white">Eliminar Participante</h3>
        
        <!-- Message -->
        <p class="text-white-50 mb-5 fs-6">
            ¿Estás completamente seguro de que deseas eliminar permanentemente a <br>
            <strong class="text-white">{{ object.nombres }} {{ object.apellidos }}</strong> del registro de entradas? Esta acción no se puede deshacer.
        </p>

        <!-- Buttons -->
        <form method="post" class="d-flex justify-content-center gap-3">
            {% csrf_token %}
            <a href="{% url 'participante_lista' evento_id=object.evento.id %}" class="btn btn-glass px-4">
                <i class="bi bi-x-circle"></i> Cancelar
            </a>
            <button type="submit" class="btn btn-danger-glow px-4">
                <i class="bi bi-trash"></i> Proceder a Eliminar
            </button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
