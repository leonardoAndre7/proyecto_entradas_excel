<!DOCTYPE html>

<html>
<head>
<title>Plano</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
body{
margin:0;
overflow:hidden;
}

#container{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
background:#eee;
touch-action: none;
}

#plano,#draw-layer{
position:absolute;
left:0;
top:0;
transform-origin: top left;
}

.panel{
position:fixed;
top:10px;
left:10px;
z-index:10;
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}
</style>

</head>

<body>

<div id="container">
<img id="plano" src="{{ plano.imagen.url }}">
<canvas id="draw-layer"></canvas>
<input type="hidden" id="plano_id" value="{{ plano.id }}">
</div>

{% if es_admin %}

<div class="panel">
<button onclick="setModo('vendido')">🔴 Vendido</button>
<button onclick="setModo('reservado')">🟡 Reservado</button>
<button onclick="activarPoligono()">✏️ Polígono</button>
<button onclick="deshacer()">↩ Deshacer</button>
</div>
{% endif %}

<script>

const esAdmin = "{{ es_admin|yesno:'true,false' }}" === "true";

let lotes = [];
try{
    lotes = JSON.parse('{{ lotes|escapejs }}');
}catch(e){
    console.log("Error lotes", e);
}

let historial = [];

let modo = "vendido";
let modoDibujo = "rect";

function setModo(n){ 
    modo = n; 
    modoDibujo = "rect";
}

function activarPoligono(){
    modoDibujo = "poligono";
    puntos = [];
}

const plano = document.getElementById("plano");
const canvas = document.getElementById("draw-layer");
const container = document.getElementById("container");
const ctx = canvas.getContext("2d");

let scale = 1;
let minScale = 1;

let posX = 0;
let posY = 0;

let isDragging = false;
let startX, startY;

let isDrawingRect = false;
let rectStartX = 0;
let rectStartY = 0;

let lastDistance = null;
let puntos = [];

/* INIT */
function iniciar(){

canvas.width = plano.naturalWidth;
canvas.height = plano.naturalHeight;

let cw = container.clientWidth;
let ch = container.clientHeight;

let scaleX = cw / plano.naturalWidth;
let scaleY = ch / plano.naturalHeight;

minScale = Math.max(scaleX, scaleY);
scale = minScale;

actualizarTransform();
dibujarLotes();
}

plano.onload = iniciar;
if(plano.complete){ iniciar(); }

/* DRAW */
function dibujarLotes(){

ctx.clearRect(0,0,canvas.width,canvas.height);

lotes.forEach(lote=>{

let color = lote.estado === "vendido"
? "rgba(255,0,0,0.4)"
: "rgba(255,255,0,0.4)";

if(lote.width != null){
ctx.fillStyle = color;
ctx.fillRect(lote.x, lote.y, lote.width, lote.height);
}

if(lote.puntos && lote.puntos.length >= 2){

ctx.strokeStyle = "black";
ctx.lineWidth = 20;

ctx.beginPath();

lote.puntos.forEach((p,i)=>{
if(i===0) ctx.moveTo(p.x,p.y);
else ctx.lineTo(p.x,p.y);
});

ctx.closePath();
ctx.stroke();
}

});

}

/* ZOOM PC */
container.addEventListener("wheel",function(e){

e.preventDefault();

scale += (e.deltaY < 0 ? 0.1 : -0.1);

if(scale < minScale) scale = minScale;
if(scale > 5) scale = 5;

limitar();
actualizarTransform();
});

/* MOUSE */
container.addEventListener("mousedown",function(e){

let rect = canvas.getBoundingClientRect();
let x = (e.clientX - rect.left) / scale;
let y = (e.clientY - rect.top) / scale;

if(e.shiftKey && esAdmin){
isDrawingRect = true;
rectStartX = x;
rectStartY = y;
}else{
isDragging = true;
startX = e.clientX - posX;
startY = e.clientY - posY;
}

});

document.addEventListener("mousemove",function(e){

if(isDragging){
posX = e.clientX - startX;
posY = e.clientY - startY;
limitar();
actualizarTransform();
}

if(isDrawingRect){

let rect = canvas.getBoundingClientRect();
let x = (e.clientX - rect.left) / scale;
let y = (e.clientY - rect.top) / scale;

let w = x - rectStartX;
let h = y - rectStartY;

dibujarLotes();

ctx.strokeStyle = "black";
ctx.lineWidth = 3;
ctx.strokeRect(rectStartX, rectStartY, w, h);

}

});

document.addEventListener("mouseup",function(e){

isDragging = false;

if(isDrawingRect){

let rect = canvas.getBoundingClientRect();
let x = (e.clientX - rect.left) / scale;
let y = (e.clientY - rect.top) / scale;

guardarRect(rectStartX, rectStartY, x-rectStartX, y-rectStartY);
isDrawingRect = false;

}

});

/* TOUCH */
container.addEventListener("touchstart", function(e){

if(e.touches.length === 1){
let t = e.touches[0];
isDragging = true;
startX = t.clientX - posX;
startY = t.clientY - posY;
}

if(e.touches.length === 2){
lastDistance = getDistance(e.touches);
}

}, { passive:false });

container.addEventListener("touchmove", function(e){

e.preventDefault();

if(e.touches.length === 1 && isDragging){

let t = e.touches[0];

posX = t.clientX - startX;
posY = t.clientY - startY;

limitar();
actualizarTransform();
}

if(e.touches.length === 2){

let newDist = getDistance(e.touches);

if(lastDistance){
let delta = newDist - lastDistance;
scale += delta * 0.005;

if(scale < minScale) scale = minScale;
if(scale > 5) scale = 5;

limitar();
actualizarTransform();
}

lastDistance = newDist;
}

}, { passive:false });

container.addEventListener("touchend", function(){
isDragging = false;
lastDistance = null;
});

/* DISTANCIA */
function getDistance(t){
let dx = t[0].clientX - t[1].clientX;
let dy = t[0].clientY - t[1].clientY;
return Math.sqrt(dx*dx + dy*dy);
}

/* LIMIT */
function limitar(){
let w = plano.naturalWidth * scale;
let h = plano.naturalHeight * scale;

let minX = container.clientWidth - w;
let minY = container.clientHeight - h;

if(posX > 0) posX = 0;
if(posY > 0) posY = 0;

if(posX < minX) posX = minX;
if(posY < minY) posY = minY;
}

/* TRANSFORM */
function actualizarTransform(){
let t = `translate(${posX}px,${posY}px) scale(${scale})`;
plano.style.transform = t;
canvas.style.transform = t;
}

/* GUARDAR */
function guardarRect(x,y,w,h){

const planoId = document.getElementById("plano_id").value;

fetch("/lotes/guardar-lote/",{
method:"POST",
headers:{
"Content-Type":"application/json",
"X-CSRFToken":getCookie("csrftoken")
},
body:JSON.stringify({x,y,width:w,height:h,estado:modo,plano_id:planoId})
})
.then(r=>r.json())
.then(data=>{
lotes.push({id:data.id,x,y,width:w,height:h,estado:modo});
historial.push(data.id);
dibujarLotes();
});
}

/* DESHACER */
function deshacer(){

if(historial.length===0) return;

let id = historial.pop();

lotes = lotes.filter(l=>l.id!==id);

fetch("/lotes/eliminar-lote/",{
method:"POST",
headers:{
"Content-Type":"application/json",
"X-CSRFToken":getCookie("csrftoken")
},
body:JSON.stringify({id:id})
});

dibujarLotes();
}

/* CSRF */
function getCookie(name){
let cookieValue=null;
if(document.cookie){
let cookies=document.cookie.split(';');
for(let c of cookies){
c=c.trim();
if(c.startsWith(name+'=')){
cookieValue=decodeURIComponent(c.substring(name.length+1));
}
}
}
return cookieValue;
}

</script>

</body>
</html>
