<!DOCTYPE html>
<html>
<head>
<title>Plano</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<!-- PDF.js para renderizar planos en formato PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body{ margin:0; overflow:hidden; }

#container{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:#eee;
  touch-action: none;
}

#plano,#draw-layer{
  position:absolute;
  left:0;
  top:0;
  transform-origin: top left;
}

.panel{
  position:fixed;
  top:10px;
  left:10px;
  z-index:10;
  background:white;
  padding:10px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

{% if plano %}
<div id="container">
  <!-- src vacío inicialmente; JavaScript lo rellena (imagen o PDF renderizado) -->
  <img id="plano" src="">
  <canvas id="draw-layer"></canvas>
  <input type="hidden" id="plano_id" value="{{ plano.id }}">
  <input type="hidden" id="plano_url" value="{{ plano.imagen.url }}">
</div>
{% else %}
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#222;color:#fff;font-family:sans-serif;text-align:center;gap:16px;">
  <div style="font-size:60px;">🗺️</div>
  <h2 style="margin:0;">No hay plano configurado</h2>
  <p style="color:#aaa;margin:0;">Ve al <a href="/admin/lotes/plano/add/" style="color:#90caf9;">Panel de Administración</a> para subir la imagen del mapa.</p>
</div>
{% endif %}

{% if es_admin %}
<div class="panel">
  <button onclick="setModo('vendido')">🔴 Vendido</button>
  <button onclick="setModo('reservado')">🟡 Reservado</button>
  <button onclick="activarPoligono()">✏️ Polígono</button>
  <button onclick="deshacer()">↩ Deshacer</button>
</div>
{% endif %}

{% if plano %}
<script>
// Administrador
const esAdmin = "{{ es_admin|yesno:'true,false' }}" === "true";

// Datos lotes
let lotes = [];
try{ lotes = JSON.parse('{{ lotes|escapejs }}'); }catch(e){ console.log("Error lotes", e); }
let historial = [];

let modo="vendido";
let modoDibujo="rect";
let puntos=[];

function setModo(n){ modo=n; modoDibujo="rect"; }
function activarPoligono(){ modoDibujo="poligono"; puntos=[]; }

const plano = document.getElementById("plano");
const canvas = document.getElementById("draw-layer");
const container = document.getElementById("container");
const ctx = canvas.getContext("2d");
const planoUrl = document.getElementById("plano_url").value;

let scale=1, minScale=1;
let posX=0, posY=0;
let isDragging=false;
let startX,startY;
let isDrawingRect=false;
let rectStartX=0, rectStartY=0;
let lastDistance=null;

/* INIT */
function iniciar(){
  if(!plano.naturalWidth){ setTimeout(iniciar,100); return; }
  canvas.width = plano.naturalWidth;
  canvas.height = plano.naturalHeight;
  let cw = container.clientWidth;
  let ch = container.clientHeight;
  minScale = Math.max(cw/plano.naturalWidth, ch/plano.naturalHeight);
  scale = minScale;
  actualizarTransform();
  dibujarLotes();
}

/* CARGAR PLANO: detecta si es PDF o imagen */
function cargarPlano(){
  if(planoUrl.toLowerCase().endsWith('.pdf')){
    // ── PDF.js: renderiza la primera página como imagen ──
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    pdfjsLib.getDocument(planoUrl).promise.then(function(pdf){
      pdf.getPage(1).then(function(page){
        // Escala alta para buena resolución
        const scale2 = 2.5;
        const viewport = page.getViewport({scale: scale2});
        const offscreen = document.createElement('canvas');
        offscreen.width  = viewport.width;
        offscreen.height = viewport.height;
        const offCtx = offscreen.getContext('2d');
        page.render({canvasContext: offCtx, viewport: viewport}).promise.then(function(){
          // Convertir a imagen y asignar al <img id="plano">
          plano.src = offscreen.toDataURL('image/png');
        });
      });
    }).catch(function(err){
      console.error('Error cargando PDF:', err);
    });
    plano.onload = iniciar;
  } else {
    // ── Imagen normal (PNG, JPG, etc.) ──
    plano.onload = iniciar;
    plano.src = planoUrl;
    if(plano.complete) iniciar();
  }
}
cargarPlano();

/* DIBUJAR LOTES */
function dibujarLotes(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  lotes.forEach(l=>{
      let color = l.estado==="vendido" ? "rgba(255,0,0,0.4)" : "rgba(255,255,0,0.4)";
      if(l.width!=null){ ctx.fillStyle=color; ctx.fillRect(l.x,l.y,l.width,l.height); }
      if(l.puntos && l.puntos.length>=2){
            ctx.fillStyle = "rgba(255,0,0,0.3)";  // rojo transparente
            ctx.strokeStyle = "black";
            ctx.lineWidth = 4;                     // grosor de línea (puedes ajustar)
            ctx.beginPath();
            l.puntos.forEach((p,i)=> i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
            ctx.closePath();
            ctx.fill();    // relleno
            //ctx.stroke();  // borde
        }
  });
}

/* DETECTAR LOTE */
function obtenerLoteEn(x,y){
  for(let i=lotes.length-1;i>=0;i--){
      let l=lotes[i];
      if(l.width!=null && x>=l.x && x<=l.x+l.width && y>=l.y && y<=l.y+l.height) return l;
      if(l.puntos && l.puntos.length>=3){
          let dentro=false;
          for(let j=0,k=l.puntos.length-1;j<l.puntos.length;k=j++){
              let xi=l.puntos[j].x, yi=l.puntos[j].y;
              let xj=l.puntos[k].x, yj=l.puntos[k].y;
              let intersect=((yi>y)!=(yj>y)) && (x<(xj-xi)*(y-yi)/(yj-yi)+xi);
              if(intersect) dentro=!dentro;
          }
          if(dentro) return l;
      }
  }
  return null;
}

/* ELIMINAR LOTE */
function eliminarLote(lote){
  lotes = lotes.filter(l=>l.id!==lote.id);
  fetch("/lotes/eliminar-lote/",{
      method:"POST",
      headers:{ "Content-Type":"application/json","X-CSRFToken":getCookie("csrftoken") },
      body:JSON.stringify({id:lote.id})
  });
  dibujarLotes();
}

/* MOUSE */
container.addEventListener("mousedown",function(e){
  let rect = canvas.getBoundingClientRect();
  let x=(e.clientX-rect.left)/scale;
  let y=(e.clientY-rect.top)/scale;

  if(e.altKey && esAdmin){ let lote=obtenerLoteEn(x,y); if(lote){ eliminarLote(lote); return; } }
  if(e.shiftKey && esAdmin && modoDibujo==="rect"){ isDrawingRect=true; rectStartX=x; rectStartY=y; }
  else{ isDragging=true; startX=e.clientX-posX; startY=e.clientY-posY; }
});

document.addEventListener("mousemove",function(e){
  if(isDragging){ posX=e.clientX-startX; posY=e.clientY-startY; limitar(); actualizarTransform(); }
  if(isDrawingRect){
      let rect = canvas.getBoundingClientRect();
      let x=(e.clientX-rect.left)/scale;
      let y=(e.clientY-rect.top)/scale;
      dibujarLotes();
      ctx.strokeStyle="black";
      ctx.strokeRect(rectStartX,rectStartY,x-rectStartX,y-rectStartY);
  }
});

document.addEventListener("mouseup",function(e){
  isDragging=false;
  if(isDrawingRect){
      let rect = canvas.getBoundingClientRect();
      let x=(e.clientX-rect.left)/scale;
      let y=(e.clientY-rect.top)/scale;
      guardarRect(rectStartX,rectStartY,x-rectStartX,y-rectStartY);
      isDrawingRect=false;
  }
});

/* POLIGONO */
container.addEventListener("click",function(e){
  if(!esAdmin || modoDibujo!=="poligono") return;
  let rect=canvas.getBoundingClientRect();
  let x=(e.clientX-rect.left)/scale;
  let y=(e.clientY-rect.top)/scale;
  puntos.push({x,y});
  dibujarLotes();
  ctx.strokeStyle="black";
  ctx.lineWidth=18;
  ctx.beginPath();
  puntos.forEach((p,i)=> i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
  ctx.stroke();
});

/* CLICK DERECHO = FINALIZAR POLIGONO */
container.addEventListener("contextmenu",function(e){
  e.preventDefault();
  if(!esAdmin || modoDibujo!=="poligono") return;
  if(puntos.length<3) return;
  guardarPoligono(puntos);
  puntos=[]; modoDibujo="rect";
});

/* ZOOM MOUSE */
container.addEventListener("wheel",function(e){
  e.preventDefault();
  let rect=container.getBoundingClientRect();
  let cx=e.clientX-rect.left;
  let cy=e.clientY-rect.top;

  let prev=scale;
  scale += (e.deltaY<0?0.1:-0.1);
  if(scale<minScale) scale=minScale;
  if(scale>5) scale=5;

  let ratio = scale/prev;
  posX = cx - (cx - posX) * ratio;
  posY = cy - (cy - posY) * ratio;

  limitar();
  actualizarTransform();
});

/* TOUCH */
container.addEventListener("touchstart",function(e){
  if(e.touches.length===1){ let t=e.touches[0]; isDragging=true; startX=t.clientX-posX; startY=t.clientY-posY; }
  if(e.touches.length===2){ lastDistance=getDistance(e.touches); }
},{passive:false});

container.addEventListener("touchmove", function(e){
  e.preventDefault();

  if(e.touches.length === 1 && isDragging){
      let t = e.touches[0];
      posX = t.clientX - startX;
      posY = t.clientY - startY;
      limitar(); actualizarTransform();
  }

  if(e.touches.length === 2){
      let newDist = getDistance(e.touches);
      let rect = container.getBoundingClientRect();
      let cx = (e.touches[0].clientX + e.touches[1].clientX)/2 - rect.left;
      let cy = (e.touches[0].clientY + e.touches[1].clientY)/2 - rect.top;

      if(lastDistance){
          let prev = scale;
          scale += (newDist - lastDistance) * 0.005;
          if(scale<minScale) scale=minScale;
          if(scale>5) scale=5;

          let ratio = scale/prev;
          posX = cx - (cx - posX) * ratio;
          posY = cy - (cy - posY) * ratio;
      }

      lastDistance = newDist;
      limitar();
      actualizarTransform();
  }
},{passive:false});

container.addEventListener("touchend", function(e){
  isDragging=false;
  lastDistance=null;
});

/* GUARDAR RECT */
function guardarRect(x,y,w,h){
  const planoId=document.getElementById("plano_id").value;
  fetch("/lotes/guardar-lote/",{
    method:"POST",
    headers:{ "Content-Type":"application/json","X-CSRFToken":getCookie("csrftoken") },
    body:JSON.stringify({x,y,width:w,height:h,estado:modo,plano_id:planoId})
  })
  .then(r=>r.json())
  .then(d=>{ lotes.push({id:d.id,x,y,width:w,height:h,estado:modo}); historial.push(d.id); dibujarLotes(); });
}

/* GUARDAR POLIGONO */
function guardarPoligono(puntos){
  const planoId=document.getElementById("plano_id").value;
  fetch("/lotes/guardar-lote/",{
    method:"POST",
    headers:{ "Content-Type":"application/json","X-CSRFToken":getCookie("csrftoken") },
    body:JSON.stringify({puntos,estado:modo,plano_id:planoId})
  })
  .then(r=>r.json())
  .then(d=>{ lotes.push({id:d.id,puntos:[...puntos],estado:modo}); historial.push(d.id); dibujarLotes(); });
}

/* DESHACER */
function deshacer(){
  if(historial.length===0) return;
  let id=historial.pop();
  lotes=lotes.filter(l=>l.id!==id);
  fetch("/lotes/eliminar-lote/",{
    method:"POST",
    headers:{ "Content-Type":"application/json","X-CSRFToken":getCookie("csrftoken") },
    body:JSON.stringify({id})
  });
  dibujarLotes();
}

/* CSRF */
function getCookie(name){
  let v=null;
  if(document.cookie){
    document.cookie.split(';').forEach(c=>{ c=c.trim(); if(c.startsWith(name+'=')){ v=decodeURIComponent(c.substring(name.length+1)); } });
  }
  return v;
}

/* DISTANCIA TOUCH */
function getDistance(t){
  let dx=t[0].clientX-t[1].clientX;
  let dy=t[0].clientY-t[1].clientY;
  return Math.sqrt(dx*dx+dy*dy);
}

/* LIMIT Y TRANSFORM */
function limitar(){
  let w=plano.naturalWidth*scale;
  let h=plano.naturalHeight*scale;
  let minX=container.clientWidth-w;
  let minY=container.clientHeight-h;
  if(posX>0) posX=0;
  if(posY>0) posY=0;
  if(posX<minX) posX=minX;
  if(posY<minY) posY=minY;
}
function actualizarTransform(){
  let t=`translate(${posX}px,${posY}px) scale(${scale})`;
  plano.style.transform=t;
  canvas.style.transform=t;
}
</script>
{% endif %}

</body>
</html>
