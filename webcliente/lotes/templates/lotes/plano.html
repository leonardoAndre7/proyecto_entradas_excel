<!DOCTYPE html>

<html>
<head>
<title>Plano</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
body{
margin:0;
overflow:hidden;
}

#container{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
background:#eee;
touch-action: none; /* 🔥 clave para mobile */
}

#plano,#draw-layer{
position:absolute;
left:0;
top:0;
transform-origin: top left;
}

.panel{
position:fixed;
top:10px;
left:10px;
z-index:10;
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}
</style>

</head>

<body>

<div id="container">
<img id="plano" src="{{ plano.imagen.url }}">
<canvas id="draw-layer"></canvas>
<input type="hidden" id="plano_id" value="{{ plano.id }}">
</div>

{% if es_admin %}

<div class="panel">
<button onclick="setModo('vendido')">🔴 Vendido</button>
<button onclick="setModo('reservado')">🟡 Reservado</button>
<button onclick="activarPoligono()">✏️ Polígono</button>
<button onclick="deshacer()">↩ Deshacer</button>
</div>
{% endif %}

<script>

const esAdmin = "{{ es_admin|yesno:'true,false' }}" === "true";

let lotes = [];
try{
    lotes = JSON.parse('{{ lotes|escapejs }}');
}catch(e){
    console.log("Error lotes", e);
}

let historial = [];

let modo = "vendido";
let modoDibujo = "rect";

function setModo(n){ 
    modo = n; 
    modoDibujo = "rect";
}

function activarPoligono(){
    modoDibujo = "poligono";
    puntos = [];
}

const plano = document.getElementById("plano");
const canvas = document.getElementById("draw-layer");
const container = document.getElementById("container");
const ctx = canvas.getContext("2d");

let scale = 1;
let minScale = 1;

let posX = 0;
let posY = 0;

let isDragging = false;
let startX, startY;

let lastDistance = null;

let puntos = [];

/* INIT */
function iniciar(){

canvas.width = plano.naturalWidth;
canvas.height = plano.naturalHeight;

let cw = container.clientWidth;
let ch = container.clientHeight;

let scaleX = cw / plano.naturalWidth;
let scaleY = ch / plano.naturalHeight;

minScale = Math.max(scaleX, scaleY);
scale = minScale;

actualizarTransform();
dibujarLotes();
}

plano.onload = iniciar;
if(plano.complete){ iniciar(); }

/* DRAW */
function dibujarLotes(){
ctx.clearRect(0,0,canvas.width,canvas.height);

lotes.forEach(lote=>{
let color = lote.estado === "vendido"
? "rgba(255,0,0,0.4)"
: "rgba(255,255,0,0.4)";

if(lote.width != null){
ctx.fillStyle = color;
ctx.fillRect(lote.x, lote.y, lote.width, lote.height);
}
});
}

/* ZOOM PC */
container.addEventListener("wheel",function(e){
e.preventDefault();

scale += (e.deltaY < 0 ? 0.1 : -0.1);
if(scale < minScale) scale = minScale;
if(scale > 5) scale = 5;

limitar();
actualizarTransform();
});

/* MOUSE */
container.addEventListener("mousedown",function(e){
isDragging = true;
startX = e.clientX - posX;
startY = e.clientY - posY;
});

document.addEventListener("mousemove",function(e){
if(!isDragging) return;

posX = e.clientX - startX;
posY = e.clientY - startY;

limitar();
actualizarTransform();
});

document.addEventListener("mouseup",function(){
isDragging = false;
});

/* TOUCH - DRAG + PINCH */

container.addEventListener("touchstart", function(e){

if(e.touches.length === 1){
let t = e.touches[0];
isDragging = true;
startX = t.clientX - posX;
startY = t.clientY - posY;
}

if(e.touches.length === 2){
lastDistance = getDistance(e.touches);
}

}, { passive:false });

container.addEventListener("touchmove", function(e){

e.preventDefault();

if(e.touches.length === 1 && isDragging){

let t = e.touches[0];

posX = t.clientX - startX;
posY = t.clientY - startY;

limitar();
actualizarTransform();
}

if(e.touches.length === 2){

let newDist = getDistance(e.touches);

if(lastDistance){

let delta = newDist - lastDistance;
scale += delta * 0.005;

if(scale < minScale) scale = minScale;
if(scale > 5) scale = 5;

limitar();
actualizarTransform();
}

lastDistance = newDist;
}

}, { passive:false });

container.addEventListener("touchend", function(){
isDragging = false;
lastDistance = null;
});

/* DISTANCIA ENTRE DEDOS */
function getDistance(touches){
let dx = touches[0].clientX - touches[1].clientX;
let dy = touches[0].clientY - touches[1].clientY;
return Math.sqrt(dx*dx + dy*dy);
}

/* LIMIT */
function limitar(){
let w = plano.naturalWidth * scale;
let h = plano.naturalHeight * scale;

let minX = container.clientWidth - w;
let minY = container.clientHeight - h;

if(posX > 0) posX = 0;
if(posY > 0) posY = 0;

if(posX < minX) posX = minX;
if(posY < minY) posY = minY;
}

/* TRANSFORM */
function actualizarTransform(){
let t = `translate(${posX}px,${posY}px) scale(${scale})`;
plano.style.transform = t;
canvas.style.transform = t;
}

</script>

</body>
</html>
