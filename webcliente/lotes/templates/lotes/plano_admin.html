<!DOCTYPE html>
<html>
<head>
<title>Plano — Administración</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { overflow: hidden; background: #1e293b; font-family: 'Segoe UI', sans-serif; }

#container {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #eee;
  touch-action: none;
}
#plano, #draw-layer {
  position: absolute;
  left: 0; top: 0;
  transform-origin: top left;
}

/* Panel de control */
.panel {
  position: fixed;
  top: 12px; left: 12px;
  z-index: 100;
  background: rgba(15, 23, 42, 0.95);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  color: #fff;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  min-width: 175px;
}
.panel-title { font-weight: 700; font-size: 14px; color: #fbbf24; margin-bottom: 2px; }
.panel-sub   { font-size: 11px; color: #64748b; margin-bottom: 4px; }
.modo-btn {
  padding: 8px 14px; border: none; border-radius: 9px;
  cursor: pointer; font-weight: 600; font-size: 13px;
  display: flex; align-items: center; gap: 7px;
  transition: opacity 0.15s, transform 0.1s;
  width: 100%;
}
.modo-btn:hover  { opacity: 0.85; transform: scale(1.02); }
.modo-btn.activo { outline: 3px solid #fff; outline-offset: 1px; }
.btn-vendido    { background: #dc2626; color: #fff; }
.btn-reservado  { background: #d97706; color: #fff; }
.btn-disponible { background: #059669; color: #fff; }
.divider { border-top: 1px solid rgba(255,255,255,0.1); }

#tooltip {
  position: fixed;
  background: rgba(0,0,0,0.88);
  color: #fff; padding: 5px 11px;
  border-radius: 7px; font-size: 12px;
  pointer-events: none; display: none; z-index: 200;
  border: 1px solid rgba(255,255,255,0.1);
}
</style>
</head>
<body>

{% if plano %}
<div id="container">
  <img id="plano" src="{{ plano.imagen.url }}" alt="Plano">
  <canvas id="draw-layer"></canvas>
  <input type="hidden" id="plano_id" value="{{ plano.id }}">
</div>
{% else %}
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#0f172a;color:#fff;text-align:center;gap:14px;">
  <div style="font-size:56px;">🗺️</div>
  <h2>No hay plano configurado</h2>
  <p style="color:#64748b;">Ve al <a href="/admin/lotes/plano/add/" style="color:#60a5fa;">Admin → Lotes → Planos</a> y sube un PDF o imagen.</p>
</div>
{% endif %}

<!-- Panel admin — siempre visible -->
<div class="panel">
  <div class="panel-title">🗺️ Gestión de Lotes</div>
  <div class="panel-sub">Clic en un lote para cambiar estado</div>
  <div class="divider"></div>
  <button class="modo-btn btn-vendido activo" id="btn-vendido"    onclick="setModo('vendido')">
    🔴 Marcar Vendido
  </button>
  <button class="modo-btn btn-reservado"      id="btn-reservado"  onclick="setModo('reservado')">
    🟡 Marcar Separado
  </button>
  <button class="modo-btn btn-disponible"     id="btn-disponible" onclick="setModo('disponible')">
    🟢 Disponible
  </button>
</div>

<div id="tooltip"></div>

{% if plano %}
<script>
let lotes = [];
try { lotes = JSON.parse('{{ lotes|escapejs }}'); } catch(e) {}

let modo = "vendido";

function setModo(m) {
  modo = m;
  document.querySelectorAll('.modo-btn').forEach(b => b.classList.remove('activo'));
  const btn = document.getElementById('btn-' + m);
  if (btn) btn.classList.add('activo');
}

const planoImg  = document.getElementById("plano");
const canvas    = document.getElementById("draw-layer");
const container = document.getElementById("container");
const tooltip   = document.getElementById("tooltip");
const ctx       = canvas.getContext("2d");

let scale = 1, minScale = 1;
let posX = 0, posY = 0;
let isDragging = false, dragMovido = false;
let startX, startY, lastDistance = null;

function iniciar() {
  if (!planoImg.naturalWidth) { setTimeout(iniciar, 100); return; }
  canvas.width  = planoImg.naturalWidth;
  canvas.height = planoImg.naturalHeight;
  minScale = Math.max(
    container.clientWidth  / planoImg.naturalWidth,
    container.clientHeight / planoImg.naturalHeight
  );
  scale = minScale;
  actualizarTransform();
  dibujarLotes();
}
planoImg.onload = iniciar;
if (planoImg.complete) iniciar();

function colorPorEstado(estado) {
  if (estado === "vendido")   return { fill: "rgba(220,38,38,0.50)",  stroke: "rgba(185,28,28,0.9)" };
  if (estado === "reservado") return { fill: "rgba(217,119,6,0.50)",  stroke: "rgba(180,100,0,0.9)" };
  return { fill: "rgba(0,0,0,0)", stroke: "rgba(80,80,80,0.2)" };
}

function dibujarLotes() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  lotes.forEach(l => {
    const c = colorPorEstado(l.estado);
    ctx.fillStyle = c.fill; ctx.strokeStyle = c.stroke; ctx.lineWidth = 1.5;
    if (l.puntos && l.puntos.length >= 3) {
      ctx.beginPath();
      l.puntos.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
      ctx.closePath(); ctx.fill(); ctx.stroke();
    } else if (l.width != null) {
      ctx.fillRect(l.x, l.y, l.width, l.height);
      ctx.strokeRect(l.x, l.y, l.width, l.height);
    }
  });
}

function obtenerLoteEn(x, y) {
  for (let i = lotes.length - 1; i >= 0; i--) {
    const l = lotes[i];
    if (l.width != null && x >= l.x && x <= l.x+l.width && y >= l.y && y <= l.y+l.height) return l;
    if (l.puntos && l.puntos.length >= 3) {
      let dentro = false, j = l.puntos.length - 1;
      for (let k = 0; k < l.puntos.length; j = k++) {
        const xi=l.puntos[k].x, yi=l.puntos[k].y, xj=l.puntos[j].x, yj=l.puntos[j].y;
        if (((yi>y)!==(yj>y)) && (x < (xj-xi)*(y-yi)/(yj-yi)+xi)) dentro = !dentro;
      }
      if (dentro) return l;
    }
  }
  return null;
}

function cambiarEstado(lote, nuevoEstado) {
  const idx = lotes.findIndex(l => l.id === lote.id);
  if (idx < 0) return;
  lotes[idx].estado = nuevoEstado;
  dibujarLotes();
  fetch("/lotes/cambiar-estado/", {
    method: "POST",
    headers: { "Content-Type": "application/json", "X-CSRFToken": getCookie("csrftoken") },
    body: JSON.stringify({ id: lote.id, estado: nuevoEstado })
  }).catch(err => console.error("Error guardando:", err));
}

/* ── Mouse ── */
container.addEventListener("mousedown", e => {
  isDragging = true; dragMovido = false;
  startX = e.clientX - posX; startY = e.clientY - posY;
});
document.addEventListener("mousemove", e => {
  if (isDragging) {
    if (Math.abs(e.clientX-(startX+posX)) > 3 || Math.abs(e.clientY-(startY+posY)) > 3) dragMovido = true;
    posX = e.clientX - startX; posY = e.clientY - startY;
    limitar(); actualizarTransform();
  }
  if (!isDragging) {
    const rect = canvas.getBoundingClientRect();
    const lote = obtenerLoteEn((e.clientX-rect.left)/scale, (e.clientY-rect.top)/scale);
    if (lote) {
      const etq = { vendido:"🔴 Vendido", reservado:"🟡 Separado", disponible:"🟢 Disponible" };
      tooltip.textContent = `Lote — ${etq[lote.estado]||lote.estado}`;
      tooltip.style.display = "block";
      tooltip.style.left = (e.clientX+14)+"px"; tooltip.style.top = (e.clientY-10)+"px";
    } else { tooltip.style.display = "none"; }
  }
});
document.addEventListener("mouseup", e => {
  isDragging = false;
  if (!dragMovido) {
    const rect = canvas.getBoundingClientRect();
    const lote = obtenerLoteEn((e.clientX-rect.left)/scale, (e.clientY-rect.top)/scale);
    if (lote) cambiarEstado(lote, modo);
  }
  tooltip.style.display = "none";
});

/* ── Zoom ── */
container.addEventListener("wheel", e => {
  e.preventDefault();
  const rect = container.getBoundingClientRect();
  const cx = e.clientX-rect.left, cy = e.clientY-rect.top, prev = scale;
  scale = Math.max(minScale, Math.min(8, scale+(e.deltaY<0?0.1:-0.1)));
  const r = scale/prev;
  posX = cx-(cx-posX)*r; posY = cy-(cy-posY)*r;
  limitar(); actualizarTransform();
});

/* ── Touch ── */
container.addEventListener("touchstart", e => {
  if (e.touches.length===1) { isDragging=true; dragMovido=false; startX=e.touches[0].clientX-posX; startY=e.touches[0].clientY-posY; }
  if (e.touches.length===2) lastDistance=getDist(e.touches);
},{passive:false});
container.addEventListener("touchmove", e => {
  e.preventDefault();
  if (e.touches.length===1 && isDragging) {
    if (Math.abs(e.touches[0].clientX-(startX+posX))>5 || Math.abs(e.touches[0].clientY-(startY+posY))>5) dragMovido=true;
    posX=e.touches[0].clientX-startX; posY=e.touches[0].clientY-startY; limitar(); actualizarTransform();
  }
  if (e.touches.length===2) {
    const nd=getDist(e.touches), rect=container.getBoundingClientRect();
    const cx=(e.touches[0].clientX+e.touches[1].clientX)/2-rect.left;
    const cy=(e.touches[0].clientY+e.touches[1].clientY)/2-rect.top;
    if (lastDistance) { const prev=scale, r=(scale=Math.max(minScale,Math.min(8,scale+(nd-lastDistance)*0.005)))/prev; posX=cx-(cx-posX)*r; posY=cy-(cy-posY)*r; }
    lastDistance=nd; limitar(); actualizarTransform();
  }
},{passive:false});
container.addEventListener("touchend", e => {
  if (!dragMovido && e.changedTouches.length===1) {
    const t=e.changedTouches[0], rect=canvas.getBoundingClientRect();
    const lote=obtenerLoteEn((t.clientX-rect.left)/scale,(t.clientY-rect.top)/scale);
    if (lote) cambiarEstado(lote, modo);
  }
  isDragging=false; lastDistance=null;
});

function limitar() {
  const w=planoImg.naturalWidth*scale, h=planoImg.naturalHeight*scale;
  posX=Math.min(0,Math.max(container.clientWidth-w,posX));
  posY=Math.min(0,Math.max(container.clientHeight-h,posY));
}
function actualizarTransform() {
  const t=`translate(${posX}px,${posY}px) scale(${scale})`;
  planoImg.style.transform=canvas.style.transform=t;
}
function getCookie(name) {
  let v=null;
  document.cookie.split(';').forEach(c=>{ c=c.trim(); if(c.startsWith(name+'=')) v=decodeURIComponent(c.substring(name.length+1)); });
  return v;
}
function getDist(t) { const dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY; return Math.sqrt(dx*dx+dy*dy); }
</script>
{% endif %}

</body>
</html>
